<!DOCTYPE html><html lang="pt"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>InvestMZ Wallet</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-slate-950 text-white min-h-screen"><div class="max-w-sm mx-auto p-4 pt-10"><div class="bg-gradient-to-br from-violet-900/40 to-blue-900/40 backdrop-blur rounded-3xl p-6 border border-white/10"><p class="text-slate-400 text-sm">Saldo disponível</p><h1 id="saldo" class="text-5xl font-bold mt-1">0<span class="text-2xl ml-2">MZN</span></h1><div class="grid grid-cols-2 gap-3 mt-6"><button onclick="openDep()" class="bg-violet-600 py-4 rounded-2xl font-semibold">Depositar</button><button onclick="alert('Em breve')" class="bg-white/10 py-4 rounded-2xl">Levantar</button></div><p class="text-xs text-slate-500 mt-4">XP: <span id="xp">0</span> • Maputo</p></div><div class="mt-6 bg-white/5 rounded-2xl p-4"><h2 class="font-semibold mb-2">Mini Tarefas</h2><div class="space-y-2 text-sm"><div class="flex justify-between"><span>Check-in diário</span><span class="text-violet-400">+5 XP</span></div><div class="flex justify-between"><span>Primeiro depósito</span><span class="text-violet-400">+50 XP</span></div></div></div></div><div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-end"><div class="bg-slate-900 w-full rounded-t-3xl p-6"><h3 class="text-xl font-bold mb-4">Depositar</h3><select id="met" class="w-full bg-slate-800 p-4 rounded-xl mb-3"><option value="mpesa">M-Pesa Vodacom</option><option value="emola">e-Mola</option></select><input id="val" type="number" placeholder="Valor em MZN" class="w-full bg-slate-800 p-4 rounded-xl mb-3"><input id="tel" type="tel" placeholder="84 123 4567" class="w-full bg-slate-800 p-4 rounded-xl mb-4"><button onclick="dep()" class="w-full bg-violet-600 py-4 rounded-xl font-bold">Confirmar</button><button onclick="modal.classList.add('hidden')" class="w-full py-3 text-slate-400 mt-2">Cancelar</button></div></div><script type="module">
import { inject } from '/@vercel/analytics';
inject();
</script>
<script>
const uid = localStorage.uid || (localStorage.uid='mz_'+Math.random().toString(36).slice(2));
async function refresh(){const r=await fetch('/api/wallet/'+uid);const d=await r.json();saldo.innerHTML=d.balance+'<span class="text-2xl ml-2">MZN</span>';xp.textContent=d.xp;}
function openDep(){modal.classList.remove('hidden')}
async function dep(){const amount=+val.value,phone=tel.value,method=met.value;modal.classList.add('hidden');await fetch('/api/deposit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:uid,amount,phone,method})});alert('Confirme no seu '+method.toUpperCase());setTimeout(refresh,3000);}
refresh();
</script></body></html>
